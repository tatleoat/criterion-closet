<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criterion Closet Simulator</title>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'VCR OSD Mono';
      src: url('/fonts/VCR_OSD_MONO_1.001.ttf') format('truetype');
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
    canvas { display: block; image-rendering: pixelated; }
    #crosshair { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; font-size: 24px; pointer-events: none; opacity: 0.7; z-index: 20; }
    #info { position: fixed; top: 10px; left: 10px; color: #fff; font-size: 12px; opacity: 0.5; z-index: 20; }
    #title-card { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center; z-index: 100; transition: opacity 0.3s; }
    #title-card.hidden { opacity: 0; pointer-events: none; }
    #title-img { width: 100%; height: 100vh; object-fit: cover; image-rendering: auto; }
    #caption { display: none; position: fixed; bottom: 0; left: 0; width: 100%; background: #000; color: #fff; padding: 10px 20px 12px; font-family: 'VCR OSD Mono', 'VT323', 'Courier New', monospace; font-size: 20px; text-align: center; letter-spacing: 2px; z-index: 5; text-transform: uppercase; border: none; }
    #panel { display: none; position: fixed; top: 0; right: 0; width: 380px; height: 100vh; background: rgba(10,10,10,0.95); color: #fff; padding: 20px; overflow-y: auto; font-family: 'Helvetica Neue', Arial, sans-serif; z-index: 10; }
    #panel img { width: 100%; image-rendering: pixelated; margin-bottom: 10px; }
    #panel-canvas { width: 100%; aspect-ratio: 1/1.4; image-rendering: pixelated; margin-bottom: 10px; border-radius: 4px; }
    #panel .meta { font-size: 13px; line-height: 1.6; }
    #panel .meta strong { color: #aaa; display: inline-block; width: 70px; }
    #panel .close { position: absolute; top: 10px; right: 15px; cursor: pointer; font-size: 24px; color: #fff; }
    #panel .trailers { margin-top: 15px; }
    #panel .trailers button { width: 100%; padding: 8px; background: #222; color: #fff; border: 1px solid #444; cursor: pointer; margin-bottom: 8px; text-align: left; font-size: 12px; }
    #panel .trailers button:hover { background: #333; }
    #panel .btn-add-pick { width: 100%; padding: 10px; background: #2a4a2a; color: #fff; border: 1px solid #4a6a4a; cursor: pointer; margin-bottom: 8px; font-size: 14px; font-family: 'Courier New', monospace; letter-spacing: 1px; }
    #panel .btn-add-pick:hover:not(:disabled) { background: #3a5a3a; }
    #panel .btn-add-pick:disabled { opacity: 0.4; cursor: default; }
    #panel .btn-add-pick.picked { background: #2a2a2a; border-color: #555; }
    #panel .btn-add-pick.full { background: #3a2a2a; border-color: #5a4a4a; }

    /* ─── Picks bar (bottom of screen) ─── */
    #picks-bar { position: fixed; bottom: 48px; left: 0; width: 100%; z-index: 4; pointer-events: none; display: flex; flex-direction: column; align-items: center; }
    #picks-label { font-family: 'VCR OSD Mono', 'VT323', 'Courier New', monospace; font-size: 13px; color: #888; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 4px; pointer-events: none; }
    #picks-container { display: flex; justify-content: center; align-items: flex-end; gap: -10px; pointer-events: auto; min-height: 220px; padding: 0 40px; }
    .pick-card { position: relative; width: 170px; flex-shrink: 0; margin-left: -60px; cursor: pointer; transition: transform 0.15s ease; }
    .pick-card:first-child { margin-left: 0; }
    .pick-card:hover { transform: translateY(-30px) scale(1.08) !important; z-index: 20 !important; }
    .pick-card img { width: 100%; display: block; image-rendering: pixelated; border: 1px solid #555; border-radius: 2px; }
    #picks-bar .pick-card-title { display: none; position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: #000; color: #fff; font-size: 13px; white-space: nowrap; padding: 4px 10px; pointer-events: none; font-family: 'Courier New', monospace; border: 1px solid #444; }
    #picks-bar .pick-card:hover .pick-card-title { display: block; }
  </style>
  <script>
    // Preload: count mousemove listener attachments
    window.__mouseMoveCount = 0;
    const _origAE = EventTarget.prototype.addEventListener;
    EventTarget.prototype.addEventListener = function(type, fn, opts) {
      if (type === 'mousemove' && (this === document || this === document.body || this === document.documentElement)) {
        window.__mouseMoveCount++;
        console.log('[DEBUG] mousemove listener #' + window.__mouseMoveCount + ' attached to', this.tagName || this.nodeName || '?');
      }
      return _origAE.call(this, type, fn, opts);
    };
  </script>
</head>
<body>
  <div id="crosshair">+</div>
  <div id="info">Click to enter closet · WASD move · Mouse look</div>
  <div id="caption"></div>

  <!-- Title card -->
  <div id="title-card" style="background:no-repeat center/cover #0a0a0a;">
    <img id="title-img" src="/assets/title-card.png">
  </div>

  <!-- Sort menu -->
  <div id="sort-menu" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(0,0,0,0.92); border:2px solid #4a6a4a; padding:20px 30px; z-index:50; font-family:'Courier New',monospace; color:#fff; text-align:center;">
    <div style="font-size:16px; letter-spacing:3px; margin-bottom:16px; color:#4a6a4a; text-transform:uppercase;">▼ Sort Films ▼</div>
    <div class="sort-option" data-sort="year" style="padding:10px 20px; cursor:pointer; border:1px solid #333; margin:4px 0;">Year</div>
    <div class="sort-option" data-sort="director" style="padding:10px 20px; cursor:pointer; border:1px solid #333; margin:4px 0;">Director</div>
    <div class="sort-option" data-sort="spine" style="padding:10px 20px; cursor:pointer; border:1px solid #333; margin:4px 0;">Spine #</div>
    <div class="sort-option" data-sort="country" style="padding:10px 20px; cursor:pointer; border:1px solid #333; margin:4px 0;">Country</div>
    <div class="sort-option" data-sort="color" style="padding:10px 20px; cursor:pointer; border:1px solid #333; margin:4px 0;">Color 🌈</div>
    <div id="sort-current" style="margin-top:12px; font-size:11px; color:#666;">Current: Spine #</div>
  </div>

  <!-- Wipe overlay -->
  <canvas id="wipe-canvas" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; z-index:40; pointer-events:none;"></canvas>

  <div id="panel">
    <span class="close" onclick="closePanel()">×</span>
    <canvas id="panel-canvas"></canvas>
    <div class="meta" id="panel-meta"></div>
    <div class="trailers" id="panel-trailers">
      <button onclick="window.addPick()">+ Add to Picks</button>
      <button onclick="window.searchTrailers(true)">🎬 Watch Trailer</button>
      <button onclick="window.searchTrailers(false)">🔍 Search YouTube Trailers</button>
      <div id="panel-trailer-results"></div>
    </div>
  </div>
  <div id="picks-bar">
    <div id="picks-label">PICKS (0/10)</div>
    <div id="picks-container"></div>
  </div>
  <script type="module" src="/main.js"></script>
</body>
</html>
